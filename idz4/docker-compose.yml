services:
    keeper1:
        image: clickhouse/clickhouse-server:24.8
        container_name: keeper1
        hostname: keeper1
        volumes:
            - ./config/keeper/keeper1.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
            - keeper1-data:/var/lib/clickhouse
        ports:
            - "9181:9181"
        networks:
            - clickhouse-net

    keeper2:
        image: clickhouse/clickhouse-server:24.8
        container_name: keeper2
        hostname: keeper2
        volumes:
            - ./config/keeper/keeper2.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
            - keeper2-data:/var/lib/clickhouse
        ports:
            - "9182:9181"
        networks:
            - clickhouse-net

    keeper3:
        image: clickhouse/clickhouse-server:24.8
        container_name: keeper3
        hostname: keeper3
        volumes:
            - ./config/keeper/keeper3.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
            - keeper3-data:/var/lib/clickhouse
        ports:
            - "9183:9181"
        networks:
            - clickhouse-net

    ch-s1-r1:
        image: clickhouse/clickhouse-server:24.8
        container_name: ch-s1-r1
        hostname: ch-s1-r1
        depends_on:
            - keeper1
            - keeper2
            - keeper3
        ports:
            - "8123:8123"
            - "9000:9000"
        volumes:
            - ./config/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
            - ./config/clickhouse/s1r1_macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
            - ch-s1-r1-data:/var/lib/clickhouse
        networks:
            - clickhouse-net

    ch-s1-r2:
        image: clickhouse/clickhouse-server:24.8
        container_name: ch-s1-r2
        hostname: ch-s1-r2
        depends_on:
            - keeper1
            - keeper2
            - keeper3
        ports:
            - "8124:8123"
            - "9001:9000"
        volumes:
            - ./config/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
            - ./config/clickhouse/s1r2_macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
            - ch-s1-r2-data:/var/lib/clickhouse
        networks:
            - clickhouse-net

    ch-s2-r1:
        image: clickhouse/clickhouse-server:24.8
        container_name: ch-s2-r1
        hostname: ch-s2-r1
        depends_on:
            - keeper1
            - keeper2
            - keeper3
        ports:
            - "8125:8123"
            - "9002:9000"
        volumes:
            - ./config/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
            - ./config/clickhouse/s2r1_macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
            - ch-s2-r1-data:/var/lib/clickhouse
        networks:
            - clickhouse-net

    ch-s2-r2:
        image: clickhouse/clickhouse-server:24.8
        container_name: ch-s2-r2
        hostname: ch-s2-r2
        depends_on:
            - keeper1
            - keeper2
            - keeper3
        ports:
            - "8126:8123"
            - "9003:9000"
        volumes:
            - ./config/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
            - ./config/clickhouse/s2r2_macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
            - ch-s2-r2-data:/var/lib/clickhouse
        networks:
            - clickhouse-net

volumes:
  keeper1-data:
  keeper2-data:
  keeper3-data:
  ch-s1-r1-data:
  ch-s1-r2-data:
  ch-s2-r1-data:
  ch-s2-r2-data:

networks:
  clickhouse-net:
    driver: bridge